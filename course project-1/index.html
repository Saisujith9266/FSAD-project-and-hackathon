<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insurance Claim Submission</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-row">
        <nav class="header-links" aria-label="Primary">
          <a class="header-link" href="#/submit">Submit Claim</a>
          <a class="header-link" href="#/history">Claim History</a>
          <a class="header-link" href="#support">Support</a>
        </nav>

        <div class="header-brand" aria-label="Insurance">
          <span class="header-brand-word">INSURANCE</span>
          <span class="header-brand-badge" aria-hidden="true">C.</span>
        </div>

        <div class="header-actions" aria-label="Utilities">
          <button class="icon-button" type="button" aria-label="Search" title="Search">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
              <path
                d="M10.5 3a7.5 7.5 0 1 1 0 15 7.5 7.5 0 0 1 0-15Zm0 2a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11Zm7.85 12.44 2.2 2.2a1 1 0 0 1-1.42 1.42l-2.2-2.2a1 1 0 0 1 1.42-1.42Z"
                fill="currentColor"
              />
            </svg>
          </button>
          <button class="icon-button" type="button" aria-label="Call" title="Call">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
              <path
                d="M6.6 2.9c.5-.5 1.2-.7 1.9-.5l2.5.8c.9.3 1.4 1.2 1.1 2.1l-.7 2.1c-.2.6-.1 1.3.4 1.8l2.9 2.9c.5.5 1.2.6 1.8.4l2.1-.7c.9-.3 1.8.2 2.1 1.1l.8 2.5c.2.7 0 1.4-.5 1.9l-1.2 1.2c-.7.7-1.7 1-2.6.8-3.5-.8-6.8-2.8-9.6-5.6C4.8 12.1 2.8 8.8 2 5.3c-.2-.9.1-1.9.8-2.6L3.9 1.5 6.6 2.9Z"
                fill="currentColor"
              />
            </svg>
          </button>
          <div class="lang-pill" aria-label="Language">EN</div>
        </div>
      </div>
    </header>

    <main id="main" class="main" role="main">
      <section class="hero" aria-label="Hero">
        <div class="container hero-inner">
          <div class="hero-content">
            <h1 class="hero-title">
              Travel. Stay <span class="hero-highlight">safe</span> everywhere!
            </h1>
            <p class="hero-subtitle">
              Insurance coverage can help protect you and your loved ones in any country.
            </p>
            <a class="hero-cta" href="#/submit">See all providers <span aria-hidden="true">»</span></a>
          </div>

          <div class="hero-art" aria-hidden="true">
            <svg class="hero-art-svg" viewBox="0 0 560 320" role="img" focusable="false">
              <defs>
                <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0" stop-color="var(--accent-soft)" />
                  <stop offset="1" stop-color="var(--panel)" />
                </linearGradient>
              </defs>
              <rect x="0" y="0" width="560" height="320" rx="18" fill="url(#sky)" />
              <path d="M40 95 C 140 60, 240 50, 340 65 S 500 110, 520 60" fill="none" stroke="rgba(37, 99, 235, 0.35)" stroke-width="6" />
              <path d="M55 105 C 160 80, 250 78, 350 92 S 490 130, 520 88" fill="none" stroke="rgba(37, 99, 235, 0.18)" stroke-width="3" />
              <path
                d="M180 170 L380 150 L430 162 L380 172 Z"
                fill="rgba(37, 99, 235, 0.65)"
              />
              <path
                d="M265 158 L350 128 L370 132 L310 162 Z"
                fill="rgba(16, 185, 129, 0.65)"
              />
              <path d="M265 158 L240 148 L220 152 L255 164 Z" fill="rgba(15, 23, 42, 0.45)" />
              <rect x="235" y="170" width="62" height="62" rx="10" fill="rgba(16, 185, 129, 0.18)" stroke="rgba(16, 185, 129, 0.35)" />
              <rect x="300" y="182" width="74" height="50" rx="10" fill="rgba(15, 23, 42, 0.10)" stroke="rgba(15, 23, 42, 0.18)" />
            </svg>
          </div>
        </div>
      </section>

      <section class="categories" aria-label="Categories">
        <div class="container categories-grid">
          <div class="category-card">
            <div class="category-title">Fire.</div>
            <div class="category-illustration" aria-hidden="true">
              <svg viewBox="0 0 120 80" width="120" height="80" focusable="false">
                <path d="M60 74c16 0 28-12 28-28 0-11-6-20-15-26 1 11-7 15-10 20-3-6-5-12-4-20C45 28 36 40 36 54c0 11 6 20 15 24" fill="rgba(37, 99, 235, 0.20)" />
                <path d="M60 74c10 0 18-8 18-18 0-6-3-11-8-15 0 7-5 10-7 13-2-4-3-8-2-13-8 5-14 13-14 22 0 6 3 10 6 12" fill="rgba(37, 99, 235, 0.55)" />
                <path d="M20 76h80" stroke="rgba(15, 23, 42, 0.18)" stroke-width="4" stroke-linecap="round" />
              </svg>
            </div>
          </div>

          <div class="category-card">
            <div class="category-title">Health.</div>
            <div class="category-illustration" aria-hidden="true">
              <svg viewBox="0 0 120 80" width="120" height="80" focusable="false">
                <circle cx="60" cy="38" r="22" fill="rgba(37, 99, 235, 0.12)" />
                <path d="M60 54c-10-6-18-13-18-22 0-6 4-11 10-11 4 0 7 2 8 5 1-3 4-5 8-5 6 0 10 5 10 11 0 9-8 16-18 22Z" fill="rgba(37, 99, 235, 0.45)" />
                <path d="M56 34h8v-6h6v6h8v6h-8v6h-6v-6h-8z" fill="rgba(16, 185, 129, 0.75)" />
                <path d="M20 76h80" stroke="rgba(15, 23, 42, 0.18)" stroke-width="4" stroke-linecap="round" />
              </svg>
            </div>
          </div>

          <div class="category-card">
            <div class="category-title">Vehicle.</div>
            <div class="category-illustration" aria-hidden="true">
              <svg viewBox="0 0 120 80" width="120" height="80" focusable="false">
                <path d="M30 52c2-10 8-18 18-18h24c10 0 16 8 18 18l2 8H28l2-8Z" fill="rgba(37, 99, 235, 0.20)" stroke="rgba(37, 99, 235, 0.35)" />
                <path d="M45 36h30" stroke="rgba(15, 23, 42, 0.18)" stroke-width="4" stroke-linecap="round" />
                <circle cx="44" cy="62" r="7" fill="rgba(37, 99, 235, 0.55)" />
                <circle cx="76" cy="62" r="7" fill="rgba(37, 99, 235, 0.55)" />
                <path d="M20 76h80" stroke="rgba(15, 23, 42, 0.18)" stroke-width="4" stroke-linecap="round" />
              </svg>
            </div>
          </div>

          <div class="category-card">
            <div class="category-title">House.</div>
            <div class="category-illustration" aria-hidden="true">
              <svg viewBox="0 0 120 80" width="120" height="80" focusable="false">
                <path d="M30 48 60 26 90 48v22H30V48Z" fill="rgba(37, 99, 235, 0.16)" stroke="rgba(37, 99, 235, 0.30)" />
                <path d="M52 70V52h16v18" fill="rgba(16, 185, 129, 0.20)" stroke="rgba(16, 185, 129, 0.35)" />
                <path d="M20 76h80" stroke="rgba(15, 23, 42, 0.18)" stroke-width="4" stroke-linecap="round" />
              </svg>
            </div>
          </div>
        </div>
      </section>

      <section class="container app-shell" aria-label="Claims app">
        <div id="app" aria-live="polite"></div>
      </section>
    </main>

    <footer class="container footer" id="support">
      <small>Demo frontend. Data is stored locally in your browser.</small>
    </footer>

    <script src="./app.js" type="module"></script>
  </body>
</html>
