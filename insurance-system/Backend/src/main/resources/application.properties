# ─────────────────────────────────────────────
#  ClaimSafe – Application Properties
# ─────────────────────────────────────────────
spring.application.name=claimsafe-backend
server.port=8080

# ── H2 in-memory DB (replace with MySQL/Postgres for production) ──
spring.datasource.url=jdbc:h2:mem:claimsafedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── File uploads ──
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
claimsafe.upload.dir=uploads

# ── CORS (adjust origin for production) ──
claimsafe.cors.allowed-origin=*

# ── Logging ──
logging.level.com.claimsafe=DEBUG
